<form fsForm>
  <div class="fs-row.gap-sm.align-start">
    <mat-form-field>
      <mat-label>
        Date
      </mat-label>
      <input
        matInput
        fsDatePicker
        [(ngModel)]="model"
        fsFormRequired
        (ngModelChange)="ngModelChange($event)"
        (selected)="selected($event)"
        (blured)="blured($event)"
        name="datepicker"
        (closed)="pickerClosed()">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>
        Date no icon
      </mat-label>
      <input
        matInput
        fsDatePicker
        [(ngModel)]="model"
        fsFormRequired
        [icon]="false"
        (ngModelChange)="ngModelChange($event)"
        (selected)="selected($event)"
        (blured)="blured($event)"
        name="datepicker"
        (closed)="pickerClosed()">
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>
        Date no clear & icon
      </mat-label>
      <input
        matInput
        fsDatePicker
        [(ngModel)]="model"
        fsFormRequired
        [icon]="false"
        [clear]="false"
        (ngModelChange)="ngModelChange($event)"
        (selected)="selected($event)"
        (blured)="blured($event)"
        name="datepicker"
        (closed)="pickerClosed()">
    </mat-form-field>
  </div>
</form>
